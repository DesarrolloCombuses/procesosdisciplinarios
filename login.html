<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso · Procesos Disciplinarios COMBUSES</title>
<link rel="icon" type="image/png" href="icons/icon-192.png">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 60%, #1a365d 100%);
    padding: 20px;
  }
  .card {
    background: #fff; width: 100%; max-width: 410px; border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.35); padding: 38px 34px 30px; text-align: center;
  }
  .logo { max-width: 230px; width: 80%; height: auto; margin: 0 auto 10px; display: block; }
  h1 { font-size: 1.15rem; color: #1e3a5f; margin: 6px 0 2px; }
  .sub { color: #6b7280; font-size: .9rem; margin: 0 0 26px; }
  .campo { text-align: left; margin-bottom: 16px; }
  .campo label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .campo input {
    width: 100%; padding: 12px 14px; border: 1.5px solid #d1d5db; border-radius: 10px;
    font-size: 1rem; transition: border-color .15s, box-shadow .15s;
  }
  .campo input:focus { outline: none; border-color: #2c5282; box-shadow: 0 0 0 3px rgba(44,82,130,.15); }
  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer;
    background: #1e3a5f; color: #fff; font-size: 1.02rem; font-weight: 600; margin-top: 6px;
    transition: background .15s, transform .05s;
  }
  .btn:hover { background: #2c5282; }
  .btn:active { transform: scale(.99); }
  .btn:disabled { background: #9ca3af; cursor: default; }
  .msg { margin-top: 16px; font-size: .9rem; min-height: 20px; }
  .msg.err { color: #b91c1c; }
  .msg.ok  { color: #15803d; }
  .pie { margin-top: 24px; font-size: .76rem; color: #9ca3af; }
</style>
</head>
<body>
  <div class="card">
    <img id="logo" class="logo" alt="COMBUSES S.A.">
    <h1>Procesos Disciplinarios</h1>
    <p class="sub">Ingresa con tu cuenta para continuar</p>

    <form id="loginForm" autocomplete="on">
      <div class="campo">
        <label for="email">Correo</label>
        <input type="email" id="email" required placeholder="tucorreo@combuses.com.co" autocomplete="username">
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="btnEntrar">Ingresar</button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="pie">COMBUSES S.A. · Medellín</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/branding.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    // Logo de la empresa
    try { document.getElementById('logo').src = PD_BRANDING.logo; } catch (e) {}

    const form = document.getElementById('loginForm');
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('btnEntrar');

    function mostrar(texto, tipo) { msg.textContent = texto; msg.className = 'msg ' + (tipo || ''); }

    // Si ya hay sesión activa, entrar directo
    SB.auth.getSession().then(({ data }) => {
      if (data && data.session) location.replace('index.html');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { mostrar('Escribe tu correo y contraseña.', 'err'); return; }

      btn.disabled = true; btn.textContent = 'Ingresando…'; mostrar('', '');
      try {
        const { error } = await SB.auth.signInWithPassword({ email, password });
        if (error) { mostrar(mensajeAuth(error), 'err'); btn.disabled = false; btn.textContent = 'Ingresar'; return; }
        mostrar('¡Bienvenido! Entrando…', 'ok');
        location.replace(await destinoPorRol());
      } catch (err) {
        mostrar(mensajeAuth(err), 'err');
        btn.disabled = false; btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
